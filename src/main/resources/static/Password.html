<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Amazon.in Sign-In</title>
  <link rel="stylesheet" href="PasswordStyle.css"/>
</head>
<body>

  <!-- Header Logo -->
  <header class="header">
    <a href="#" class="logo-link">
      <div class="logo">
        <a href="/">  <img src="./assets/amazon_logo_dark.png" width="100" alt="Logo"> </a>
      </div>
    </a>
  </header>

  <!-- Sign-in Card -->
  <main class="main">
    <div class="signin-card">
      <h1 class="signin-title">Sign in</h1>

      <div class="email-row">
        <a href="SignIn.html" class="change-link">Change the email address</a>
      </div>

      <div class="form-group">
        <div class="password-label-row">
          <label for="password" class="label">Password</label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <input
          type="password"
          id="password"
          name="password"
          class="password-input"
          autocomplete="current-password"
        />
      </div>

      <button type="button" class="signin-btn" onclick="login()">Sign in</button>
      <p id="loginError" style="color:red; margin-top:10px;"></p>
    </div>
  </main>

  <!-- Divider -->
  <div class="divider"></div>

  <!-- Footer -->
  <footer class="footer">
    <nav class="footer-nav">
      <a href="#" class="footer-link">Conditions of Use</a>
      <a href="#" class="footer-link">Privacy Notice</a>
      <a href="#" class="footer-link">Help</a>
    </nav>
    <p class="footer-copy">&copy; 1996-2026, Amazon.com, Inc. or its affiliates</p>
  </footer>

 <script>
  async function login() {

    const password = document.getElementById("password").value;

    // You must know which contact was used
    const contact = localStorage.getItem("contact");

    const response = await fetch("/api/auth/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            contact: contact,
            password: password
        })
    });

    if (!response.ok) {
        alert("Invalid credentials");
        return;
    }

    const data = await response.json();

    localStorage.setItem("token", data.token);

    window.location.href = "/index.html";
  }

        // Attach to button
        document.querySelector(".signin-btn").addEventListener("click", login);

        </script>
</body>
</html>
