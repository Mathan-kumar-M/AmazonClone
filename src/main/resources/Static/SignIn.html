<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="SignStyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <a href="/"><img  class="logo" src="./assets/amazon_logo_dark.png" alt="Amazon Logo" width="100px"></a>
   <div class="sign-container">
             <h1 class="signin-title">Sign In or Create account</h1>
             <h5 class="input-label"> Enter Email or mobile number</h5>
             <input type="text" id="contact" required>
             <p id="res1"></p>
              <p id="result"></p>
             <button onclick="validate()">Submit</button>
             <p>By continuing, you agree to Amazon's <span><a href="">Conditions of Use</a></span> and <span><a href="">Privacy Notice.</a></span></p>
             <hr>
             <p class="underpara" style="font-size: 13px;">Buying for work?</p>
             <p style="color: rgb(14, 79, 154);"><span><a href="">Create a free business account</a></span></p>
   </div>

   <hr>

    <div class="footer">
          <div class="footer-links">
            <a href="#">Conditions of Use</a>
            <a href="#">Privacy Notice</a>
            <a href="#">Help</a>
          </div>  
      <p class="footer-text">
        © 1996-2024, Amazon.com, Inc. or its affiliates
      </p>
    </div>
    <script>

async function validate() {

    const val = document.getElementById("contact").value.trim();
    const res = document.getElementById("result");

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const numberRegex = /^[6-9]\d{9}$/;

    if (!emailRegex.test(val) && !numberRegex.test(val)) {
        res.textContent = "Invalid phone number or email";
        res.style.color = "red";
        return;
    }

    try {
        const response = await fetch(`/api/auth/check?contact=${val}`);

        if (!response.ok) {
            throw new Error("Server error");
        }

        const exists = await response.json();

        if (exists) {
            localStorage.setItem("contact", val);
            window.location.href = "/Password.html";
        } else {
            window.location.href = "/amazon_create_account.html";
        }

    } catch (error) {
        res.textContent = "Unable to connect to server";
        res.style.color = "red";
        console.error(error);
    }
}

</script>
</body>
</html>
